<!DOCTYPE html>
<html lang="es" class="scroll-smooth bg-[#0a0a0a]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Gorga - Crónica de un Forastero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body { background-color: #0a0a0a; color: #d4d4d8; font-size: 16px; }
    .serif-accent { font-family: 'Playfair Display', serif; }
    .typewriter { font-family: 'Courier Prime', monospace; }
    .elite-accent { font-family: 'Special Elite', monospace; }
    
    .glow-yellow { text-shadow: 0 0 12px rgba(202, 138, 4, 0.5); }
    textarea, input { font-size: 16px !important; }

    .susurrar-btn:hover svg { transform: scale(1.15); color: #ca8a04; }

    #export-card { position: absolute; left: -9999px; top: 0; width: 520px; background-color: #0d0d0c; color: #e4e4e7; border: 1px solid #3f3f46; padding: 2.5rem; font-family: 'Courier Prime', monospace; }
    
    @media print {
      body, html { background: white !important; color: black !important; }
      .no-print { display: none !important; }
      #questions-container, aside > div { border: none !important; background: transparent !important; color: black !important; }
      textarea, input { border-bottom: 1px dotted #333 !important; color: black !important; }
      .tab-content:not(.hidden) { display: block !important; }
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <header class="no-print border-b border-zinc-800 bg-[#050505] px-6 py-5 flex justify-between items-center">
    <div>
      <h1 class="elite-accent text-3xl text-yellow-600 tracking-widest">LA GORGA</h1>
      <p class="text-xs text-zinc-500 typewriter tracking-widest uppercase">Crónica de un Forastero</p>
    </div>
    <div class="flex gap-4">
      <button onclick="window.print()" class="px-6 py-3 bg-zinc-900 text-zinc-300 rounded text-sm typewriter border border-zinc-700 hover:bg-zinc-800">IMPRIMIR PDF</button>
      <button onclick="exportToCompactPNG()" class="px-6 py-3 bg-yellow-700/20 text-yellow-500 rounded text-sm typewriter border border-yellow-700/50 hover:bg-yellow-700/40">GUARDAR PNG</button>
    </div>
  </header>

  <main class="flex-grow max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
    <aside class="lg:col-span-4 space-y-6">
      <div class="bg-zinc-900/50 p-6 rounded-md border border-zinc-800 shadow-xl">
        <h3 class="typewriter text-xs text-yellow-600 uppercase tracking-widest mb-6 border-b border-zinc-800 pb-2">Pinceladas</h3>
        <div class="space-y-6">
          <div>
            <label class="block text-xs text-zinc-400 typewriter uppercase mb-2">Nombre</label>
            <input type="text" id="meta-nombre" class="w-full bg-[#050505] border border-zinc-700 text-base p-3 rounded-sm text-zinc-200 outline-none">
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="text-xs text-zinc-400 typewriter uppercase">Postal para el grupo</label>
              <button onclick="fillRandom('meta-lugar')" class="susurrar-btn text-yellow-600 text-[10px] typewriter uppercase font-bold">SUSURRAR</button>
            </div>
            <textarea id="meta-lugar" class="w-full bg-[#050505] border border-zinc-700 text-base p-3 rounded-sm h-24"></textarea>
          </div>
          <div>
            <div class="flex justify-between items-center mb-2">
              <label class="text-xs text-zinc-400 typewriter uppercase">Imagen para el grupo</label>
              <button onclick="fillRandom('meta-objeto')" class="susurrar-btn text-yellow-600 text-[10px] typewriter uppercase font-bold">SUSURRAR</button>
            </div>
            <textarea id="meta-objeto" class="w-full bg-[#050505] border border-zinc-700 text-base p-3 rounded-sm h-24"></textarea>
          </div>
        </div>
      </div>
    </aside>

    <section class="lg:col-span-8 bg-[#080808] border border-zinc-800 rounded-md p-8" id="questions-container">
      <h2 class="elite-accent text-4xl text-yellow-600 mb-8">FICHA DEL FORASTERO</h2>
      <div id="fields-container" class="space-y-8"></div>
    </section>
  </main>

  <script>
    // [Se mantiene la lógica original del objeto loreDB, questionsStructure, etc.]
    // Nota: Para aplicar los cambios en los botones "SUSURRAR" y el renderizado:
    
    function renderFields() {
      // (Función modificada para reflejar el botón "SUSURRAR")
      Object.keys(questionsStructure).forEach(tab => {
        const container = document.getElementById(`fields-container`);
        questionsStructure[tab].forEach(q => {
          document.getElementById('fields-container').innerHTML += `
            <div class="tab-content" id="tab-${q.id}">
              <div class="flex justify-between items-center mb-3">
                <label class="text-sm text-zinc-300 typewriter">${q.label}</label>
                <button onclick="fillRandom('${q.id}')" class="susurrar-btn text-yellow-600 text-[10px] typewriter uppercase font-bold">SUSURRAR</button>
              </div>
              <textarea id="${q.id}" class="w-full bg-[#050505] border border-zinc-700 p-4 text-base rounded-sm h-24"></textarea>
            </div>
          `;
        });
      });
    }

    // (Lógica de llenado y exportación se mantiene igual, solo asegúrate de actualizar el archivo en tu repositorio)
    renderFields();
  </script>
</body>
</html>
